<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐹 Буда Кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0b0e14 0%, #1a1f2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-container {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 25, 35, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .stats-panel {
            background: linear-gradient(135deg, #2a2f45 0%, #1e2338 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .balance-icon {
            font-size: 32px;
        }

        .energy {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
        }

        .energy-bar {
            width: 80px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 12px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #4ade80;
        }

        .energy-text {
            font-weight: 600;
            min-width: 60px;
            color: #4ade80;
        }

        .buda-section {
            text-align: center;
            margin: 20px 0 30px;
        }

        .buda-button {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(255, 215, 0, 0.6),
                        inset 0 -10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            position: relative;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .buda-button:active {
            transform: scale(0.96);
        }

        .buda-button img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .fatness-name {
            margin-top: 16px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .click-power {
            margin-top: 8px;
            font-size: 18px;
            color: #9ca3af;
            font-weight: 500;
        }

        .upgrades-section {
            margin-top: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .upgrade-card {
            background: rgba(30, 35, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .upgrade-card:active {
            transform: scale(0.96);
            background: rgba(40, 45, 65, 0.9);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .upgrade-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .upgrade-emoji {
            font-size: 42px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .upgrade-name {
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .upgrade-price {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: #0b0e14;
            font-weight: 700;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .ref-section {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-radius: 28px;
            padding: 18px;
            margin-top: 25px;
            color: white;
            box-shadow: 0 15px 25px -8px rgba(59, 130, 246, 0.5);
        }

        .ref-link {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 20px;
            font-size: 12px;
            word-break: break-all;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .copy-btn {
            background: white;
            border: none;
            color: #2563eb;
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.96);
            background: #f3f4f6;
        }

        .click-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        .click-effect.active {
            animation: ripple 0.5s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="stats-panel">
            <div class="balance">
                <span class="balance-icon">🪙</span>
                <span id="balanceDisplay">0</span>
            </div>
            <div class="energy">
                <span>⚡</span>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                </div>
                <span class="energy-text" id="energyDisplay">100/100</span>
            </div>
        </div>

        <div class="buda-section">
            <div class="buda-button" id="budaButton">
                <img src="buda.jpg" alt="Буда" id="budaImage">
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div class="fatness-name" id="fatnessName">Буда-спичка</div>
            <div class="click-power" id="clickPowerDisplay">+1 за тычок</div>
        </div>

        <div class="upgrades-section">
            <div class="section-title">
                <span>⚡</span> Прокачка
            </div>
            <div class="upgrades-grid">
                <div class="upgrade-card" onclick="buyUpgrade('power')">
                    <div class="upgrade-emoji">💪</div>
                    <div class="upgrade-name">Сила клика</div>
                    <div class="upgrade-price" id="powerCost">100</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('energy')">
                    <div class="upgrade-emoji">🔋</div>
                    <div class="upgrade-name">Макс. энергия</div>
                    <div class="upgrade-price" id="energyCost">200</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('regen')">
                    <div class="upgrade-emoji">⚡</div>
                    <div class="upgrade-name">Регенерация</div>
                    <div class="upgrade-price" id="regenCost">300</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('crit')">
                    <div class="upgrade-emoji">🎯</div>
                    <div class="upgrade-name">Крит. шанс</div>
                    <div class="upgrade-price" id="critCost">500</div>
                </div>
            </div>
        </div>

        <div class="ref-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span><strong>👥 Рефералов: <span id="referralsCount">0</span></strong></span>
                <span>+100 за друга</span>
            </div>
            <div class="ref-link" id="refLink">загрузка...</div>
            <button class="copy-btn" onclick="copyRefLink()">📋 Копировать ссылку</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        window.onbeforeunload = null;

        let userData = {
            balance: 0,
            energy: 100,
            maxEnergy: 100,
            clickPower: 1,
            totalClicks: 0,
            totalEarned: 0,
            critChance: 0,
            energyRegen: 1,
            referrals: 0
        };

        const userId = tg.initDataUnsafe.user?.id || 0;
        const botUsername = 'budka_click_bot';
        const refLink = `https://t.me/${botUsername}?start=ref_${userId}`;
        document.getElementById('refLink').textContent = refLink;

        const fatnessStages = [
            { threshold: 0, name: "Буда-спичка", emoji: "😤" },
            { threshold: 100, name: "Буда-пончик", emoji: "🍩" },
            { threshold: 1000, name: "Буда-пухлик", emoji: "🥟" },
            { threshold: 10000, name: "Буда-колобок", emoji: "⚪" },
            { threshold: 100000, name: "Буда-телепузик", emoji: "🐷" },
            { threshold: 500000, name: "Буда-бочка", emoji: "🛢️" },
            { threshold: 1000000, name: "Буда-планета", emoji: "🌍" }
        ];

        function loadData() {
            tg.CloudStorage.getItem('budaData', (err, data) => {
                if (data && !err) {
                    try {
                        const saved = JSON.parse(data);
                        userData = { ...userData, ...saved };
                    } catch (e) {}
                }
                updateDisplay();
                sendDataToBot('sync');
            });
        }

        function saveData() {
            tg.CloudStorage.setItem('budaData', JSON.stringify(userData));
            localStorage.setItem('budaData', JSON.stringify(userData));
        }

        setInterval(saveData, 5000);
        window.addEventListener('beforeunload', () => {
            saveData();
            sendDataToBot('sync');
        });

        function sendDataToBot(action, extra = {}) {
            const payload = {
                action: action,
                balance: userData.balance,
                totalClicks: userData.totalClicks,
                totalEarned: userData.totalEarned,
                ...extra
            };
            tg.sendData(JSON.stringify(payload));
        }

        function updateDisplay() {
            document.getElementById('balanceDisplay').textContent = userData.balance;
            document.getElementById('energyDisplay').textContent = `${userData.energy}/${userData.maxEnergy}`;
            document.getElementById('energyFill').style.width = `${(userData.energy / userData.maxEnergy) * 100}%`;

            const stage = fatnessStages.slice().reverse().find(s => userData.totalClicks >= s.threshold) || fatnessStages[0];
            document.getElementById('fatnessName').textContent = stage.name;

            let powerText = `+${userData.clickPower}`;
            if (userData.critChance > 0) powerText += ` (крит ${userData.critChance}%)`;
            document.getElementById('clickPowerDisplay').textContent = powerText;

            document.getElementById('powerCost').textContent = userData.clickPower * 100;
            document.getElementById('energyCost').textContent = 200;
            document.getElementById('regenCost').textContent = 300;
            document.getElementById('critCost').textContent = 500;
            document.getElementById('referralsCount').textContent = userData.referrals;

            saveData();
        }

        document.getElementById('budaButton').addEventListener('click', (e) => {
            if (userData.energy <= 0) {
                tg.HapticFeedback?.notificationOccurred('error');
                return;
            }

            const button = e.currentTarget;
            button.style.transform = 'scale(0.95)';
            setTimeout(() => button.style.transform = 'scale(1)', 100);

            const rect = button.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const effect = document.getElementById('clickEffect');
            effect.style.left = x - 40 + 'px';
            effect.style.top = y - 40 + 'px';
            effect.classList.add('active');
            setTimeout(() => effect.classList.remove('active'), 500);

            tg.HapticFeedback?.impactOccurred('medium');

            let earned = userData.clickPower;
            if (Math.random() * 100 < userData.critChance) {
                earned *= 3;
                tg.HapticFeedback?.notificationOccurred('success');
            }

            userData.balance += earned;
            userData.totalEarned += earned;
            userData.totalClicks++;
            userData.energy--;

            updateDisplay();
            sendDataToBot('click', { earned });
        });

        function buyUpgrade(type) {
            let cost = 0;
            switch(type) {
                case 'power':
                    cost = 100 * userData.clickPower;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.clickPower++;
                    }
                    break;
                case 'energy':
                    cost = 200;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.maxEnergy += 50;
                        userData.energy += 50;
                    }
                    break;
                case 'regen':
                    cost = 300;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.energyRegen++;
                    }
                    break;
                case 'crit':
                    cost = 500;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.critChance += 5;
                    }
                    break;
            }
            if (cost > 0 && userData.balance >= cost) {
                tg.HapticFeedback?.notificationOccurred('success');
                updateDisplay();
                sendDataToBot('upgrade');
            } else {
                tg.HapticFeedback?.notificationOccurred('error');
            }
        }

        window.copyRefLink = function() {
            navigator.clipboard.writeText(refLink);
            tg.HapticFeedback?.notificationOccurred('success');
            tg.showPopup({
                title: '✅ Скопировано!',
                message: 'Отправь друзьям и получай +100 монет!',
                buttons: [{ type: 'ok' }]
            });
        };

        setInterval(() => {
            if (userData.energy < userData.maxEnergy) {
                userData.energy = Math.min(userData.maxEnergy, userData.energy + userData.energyRegen);
                updateDisplay();
            }
        }, 1000);

        loadData();
    </script>
</body>
</html>
