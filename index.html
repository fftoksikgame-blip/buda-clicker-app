<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐹 Буда Кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0b0e14 0%, #1a1f2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-container {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* Верхняя панель */
        .stats-panel {
            background: linear-gradient(135deg, #2a2f45 0%, #1e2338 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffd700;
        }

        .energy {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
        }

        .energy-bar {
            width: 80px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 12px;
            transition: width 0.3s ease;
        }

        /* Буда */
        .buda-section {
            text-align: center;
            margin: 20px 0;
        }

        .buda-button {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .buda-button:active {
            transform: scale(0.96);
        }

        .buda-button img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .fatness-name {
            margin-top: 12px;
            font-size: 22px;
            font-weight: 800;
            color: #ffd700;
        }

        /* Навигация */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin: 25px 0 15px;
        }

        .nav-tab {
            flex: 1;
            background: rgba(30, 35, 50, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: #ffd700;
            color: #0b0e14;
            border-color: #ffd700;
        }

        /* Панели */
        .panel {
            background: rgba(30, 35, 50, 0.8);
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
        }

        .top-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-rank {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            background: #ffd700;
            color: #0b0e14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .top-name {
            flex: 1;
            margin-left: 12px;
            color: white;
        }

        .top-clicks {
            color: #ffd700;
            font-weight: 700;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Улучшения */
        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .upgrade-card {
            background: rgba(20, 25, 35, 0.9);
            border-radius: 24px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
        }

        .upgrade-card:active {
            transform: scale(0.96);
        }

        .upgrade-price {
            background: #ffd700;
            color: #0b0e14;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Кнопка копирования */
        .copy-btn {
            background: #ffd700;
            border: none;
            color: #0b0e14;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        /* Анимация клика */
        .click-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
        }

        .click-effect.active {
            animation: ripple 0.5s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Верхняя панель -->
        <div class="stats-panel">
            <div class="balance">
                <span>🪙</span>
                <span id="balanceDisplay">0</span>
            </div>
            <div class="energy">
                <span>⚡</span>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                </div>
                <span id="energyDisplay">100/100</span>
            </div>
        </div>

        <!-- Буда -->
        <div class="buda-section">
            <div class="buda-button" id="budaButton">
                <img src="buda.jpg" alt="Буда" id="budaImage">
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div class="fatness-name" id="fatnessName">Буда-спичка</div>
            <div class="click-power" id="clickPowerDisplay">+1 за тычок</div>
        </div>

        <!-- Навигация -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('game')">🎮 Игра</div>
            <div class="nav-tab" onclick="switchTab('upgrades')">⚡ Прокачка</div>
            <div class="nav-tab" onclick="switchTab('top')">🏆 Топ</div>
            <div class="nav-tab" onclick="switchTab('settings')">⚙️ Настройки</div>
        </div>

        <!-- Панель игры (по умолчанию активна) -->
        <div id="gamePanel">
            <div class="panel">
                <div style="color: #ffd700; margin-bottom: 15px;">📊 Твоя статистика</div>
                <div class="settings-item">
                    <span>Всего кликов</span>
                    <span id="statClicks">0</span>
                </div>
                <div class="settings-item">
                    <span>Всего заработано</span>
                    <span id="statEarned">0</span>
                </div>
                <div class="settings-item">
                    <span>Рефералов</span>
                    <span id="referralsCount">0</span>
                </div>
            </div>
            
            <div class="ref-link" style="background: rgba(30, 35, 50, 0.8); border-radius: 20px; padding: 15px; margin-top: 15px;">
                <div style="color: white; margin-bottom: 10px;">👥 Твоя реферальная ссылка</div>
                <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; font-size: 12px; word-break: break-all; color: #ffd700;" id="refLink">загрузка...</div>
                <button class="copy-btn" onclick="copyRefLink()">📋 Копировать</button>
            </div>
        </div>

        <!-- Панель прокачки (скрыта) -->
        <div id="upgradesPanel" style="display: none;">
            <div class="upgrades-grid">
                <div class="upgrade-card" onclick="buyUpgrade('power')">
                    <div class="upgrade-emoji">💪</div>
                    <div class="upgrade-name">Сила клика</div>
                    <div class="upgrade-price" id="powerCost">100</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('energy')">
                    <div class="upgrade-emoji">🔋</div>
                    <div class="upgrade-name">Макс. энергия</div>
                    <div class="upgrade-price" id="energyCost">200</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('regen')">
                    <div class="upgrade-emoji">⚡</div>
                    <div class="upgrade-name">Регенерация</div>
                    <div class="upgrade-price" id="regenCost">300</div>
                </div>
                <div class="upgrade-card" onclick="buyUpgrade('crit')">
                    <div class="upgrade-emoji">🎯</div>
                    <div class="upgrade-name">Крит. шанс</div>
                    <div class="upgrade-price" id="critCost">500</div>
                </div>
            </div>
        </div>

        <!-- Панель топа (скрыта) -->
        <div id="topPanel" style="display: none;">
            <div class="panel" id="topList">
                <div style="color: #ffd700; text-align: center; margin-bottom: 15px;">🏆 ТОП ИГРОКОВ</div>
                <div id="topContent">Загрузка...</div>
            </div>
        </div>

        <!-- Панель настроек (скрыта) -->
        <div id="settingsPanel" style="display: none;">
            <div class="panel">
                <div class="settings-item">
                    <span>Версия</span>
                    <span>1.0.0</span>
                </div>
                <div class="settings-item">
                    <span>Твой ID</span>
                    <span id="userId">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userData = {
            balance: 0,
            energy: 100,
            maxEnergy: 100,
            clickPower: 1,
            totalClicks: 0,
            totalEarned: 0,
            critChance: 0,
            energyRegen: 1,
            referrals: 0
        };

        // Топ игроков (будет заполняться с сервера)
        let topPlayers = [];

        const userId = tg.initDataUnsafe.user?.id || 0;
        document.getElementById('userId').textContent = userId;

        const botUsername = 'budka_click_bot';
        const refLink = `https://t.me/${botUsername}?start=ref_${userId}`;
        document.getElementById('refLink').textContent = refLink;

        // Стадии толстоты
        const fatnessStages = [
            { threshold: 0, name: "Буда-спичка" },
            { threshold: 100, name: "Буда-пончик" },
            { threshold: 1000, name: "Буда-пухлик" },
            { threshold: 10000, name: "Буда-колобок" },
            { threshold: 100000, name: "Буда-телепузик" },
            { threshold: 500000, name: "Буда-бочка" },
            { threshold: 1000000, name: "Буда-планета" }
        ];

        // Загрузка данных
        function loadData() {
            tg.CloudStorage.getItem('budaData', (err, data) => {
                if (data && !err) {
                    try {
                        const saved = JSON.parse(data);
                        userData = { ...userData, ...saved };
                    } catch (e) {}
                }
                updateDisplay();
                sendDataToBot('sync');
                loadTop();
            });
        }

        // Загрузка топа с сервера
        function loadTop() {
            // Здесь должен быть запрос к твоему бэкенду
            // Пока для примера заглушка
            topPlayers = [
                { name: "Игрок 1", clicks: 1500 },
                { name: "Игрок 2", clicks: 1200 },
                { name: "Игрок 3", clicks: 900 }
            ];
            renderTop();
        }

        function renderTop() {
            const topContent = document.getElementById('topContent');
            if (topPlayers.length === 0) {
                topContent.innerHTML = '<div style="text-align: center; color: #888;">Топ пока пуст</div>';
                return;
            }
            
            let html = '';
            topPlayers.forEach((player, index) => {
                html += `
                    <div class="top-item">
                        <div class="top-rank">${index + 1}</div>
                        <div class="top-name">${player.name}</div>
                        <div class="top-clicks">${player.clicks}</div>
                    </div>
                `;
            });
            topContent.innerHTML = html;
        }

        function saveData() {
            tg.CloudStorage.setItem('budaData', JSON.stringify(userData));
            localStorage.setItem('budaData', JSON.stringify(userData));
        }

        setInterval(saveData, 5000);
        window.addEventListener('beforeunload', () => {
            saveData();
            sendDataToBot('sync');
        });

        function sendDataToBot(action, extra = {}) {
            const payload = {
                action: action,
                balance: userData.balance,
                totalClicks: userData.totalClicks,
                totalEarned: userData.totalEarned,
                ...extra
            };
            tg.sendData(JSON.stringify(payload));
        }

        function updateDisplay() {
            document.getElementById('balanceDisplay').textContent = userData.balance;
            document.getElementById('energyDisplay').textContent = `${userData.energy}/${userData.maxEnergy}`;
            document.getElementById('energyFill').style.width = `${(userData.energy / userData.maxEnergy) * 100}%`;

            const stage = fatnessStages.slice().reverse().find(s => userData.totalClicks >= s.threshold) || fatnessStages[0];
            document.getElementById('fatnessName').textContent = stage.name;

            document.getElementById('clickPowerDisplay').textContent = `+${userData.clickPower} за тычок`;
            document.getElementById('powerCost').textContent = userData.clickPower * 100;
            document.getElementById('energyCost').textContent = 200;
            document.getElementById('regenCost').textContent = 300;
            document.getElementById('critCost').textContent = 500;
            
            document.getElementById('statClicks').textContent = userData.totalClicks;
            document.getElementById('statEarned').textContent = userData.totalEarned;
            document.getElementById('referralsCount').textContent = userData.referrals;

            saveData();
        }

        // Переключение вкладок
        window.switchTab = function(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('gamePanel').style.display = tab === 'game' ? 'block' : 'none';
            document.getElementById('upgradesPanel').style.display = tab === 'upgrades' ? 'block' : 'none';
            document.getElementById('topPanel').style.display = tab === 'top' ? 'block' : 'none';
            document.getElementById('settingsPanel').style.display = tab === 'settings' ? 'block' : 'none';
            
            if (tab === 'top') loadTop();
        };

        // Клик по Буде
        document.getElementById('budaButton').addEventListener('click', (e) => {
            if (userData.energy <= 0) {
                tg.HapticFeedback?.notificationOccurred('error');
                return;
            }

            const button = e.currentTarget;
            button.style.transform = 'scale(0.95)';
            setTimeout(() => button.style.transform = 'scale(1)', 100);

            const rect = button.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const effect = document.getElementById('clickEffect');
            effect.style.left = x - 40 + 'px';
            effect.style.top = y - 40 + 'px';
            effect.classList.add('active');
            setTimeout(() => effect.classList.remove('active'), 500);

            tg.HapticFeedback?.impactOccurred('medium');

            let earned = userData.clickPower;
            if (Math.random() * 100 < userData.critChance) {
                earned *= 3;
                tg.HapticFeedback?.notificationOccurred('success');
            }

            userData.balance += earned;
            userData.totalEarned += earned;
            userData.totalClicks++;
            userData.energy--;

            updateDisplay();
            sendDataToBot('click', { earned });
        });

        function buyUpgrade(type) {
            let cost = 0;
            switch(type) {
                case 'power':
                    cost = 100 * userData.clickPower;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.clickPower++;
                    }
                    break;
                case 'energy':
                    cost = 200;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.maxEnergy += 50;
                        userData.energy += 50;
                    }
                    break;
                case 'regen':
                    cost = 300;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.energyRegen++;
                    }
                    break;
                case 'crit':
                    cost = 500;
                    if (userData.balance >= cost) {
                        userData.balance -= cost;
                        userData.critChance += 5;
                    }
                    break;
            }
            if (cost > 0 && userData.balance >= cost) {
                tg.HapticFeedback?.notificationOccurred('success');
                updateDisplay();
                sendDataToBot('upgrade');
            } else {
                tg.HapticFeedback?.notificationOccurred('error');
            }
        }

        window.copyRefLink = function() {
            navigator.clipboard.writeText(refLink);
            tg.HapticFeedback?.notificationOccurred('success');
            tg.showPopup({
                title: '✅ Скопировано!',
                message: '+100 монет за каждого друга',
                buttons: [{ type: 'ok' }]
            });
        };

        setInterval(() => {
            if (userData.energy < userData.maxEnergy) {
                userData.energy = Math.min(userData.maxEnergy, userData.energy + userData.energyRegen);
                updateDisplay();
            }
        }, 1000);

        loadData();
    </script>
</body>
</html>
