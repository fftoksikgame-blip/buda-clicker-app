<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐹 Буда Кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            transition: background 0.3s;
        }

        .game-container {
            max-width: 450px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border-radius: 48px;
            padding: 24px 20px 32px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Статистика */
        .stats-panel {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
            color: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 30px -10px rgba(212, 175, 55, 0.3);
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            font-weight: 800;
            background: rgba(15, 23, 42, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .balance-icon {
            font-size: 32px;
        }

        .energy {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .energy-bar {
            width: 90px;
            height: 12px;
            background: rgba(15, 23, 42, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: #0f172a;
            border-radius: 12px;
            transition: width 0.3s ease;
        }

        .energy-text {
            font-weight: 600;
            min-width: 60px;
            color: #0f172a;
        }

        /* PPH (Прибыль в час) */
        .pph-panel {
            background: var(--tg-theme-button-color, #d4af37);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--tg-theme-button-text-color, #0f172a);
            font-weight: 700;
        }

        .pph-value {
            font-size: 20px;
            background: rgba(0,0,0,0.1);
            padding: 4px 12px;
            border-radius: 40px;
        }

        /* Буда */
        .buda-section {
            text-align: center;
            margin: 20px 0 30px;
        }

        .buda-button {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #d4af37, #b8860b);
            box-shadow: 0 25px 40px -10px rgba(212, 175, 55, 0.6), 
                        0 0 0 2px rgba(255, 255, 255, 0.1),
                        inset 0 -10px 20px rgba(0, 0, 0, 0.3),
                        inset 0 10px 20px rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .buda-button:active {
            transform: scale(0.96);
        }

        .buda-emoji {
            font-size: 140px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        }

        .fatness-name {
            margin-top: 16px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .click-power {
            margin-top: 8px;
            font-size: 18px;
            color: var(--tg-theme-hint-color, #94a3b8);
            font-weight: 500;
        }

        /* Улучшения */
        .upgrades-section {
            margin-top: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--tg-theme-text-color, #ffffff);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .upgrade-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.1);
        }

        .upgrade-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .upgrade-emoji {
            font-size: 42px;
        }

        .upgrade-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--tg-theme-text-color, #ffffff);
        }

        .upgrade-price {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-weight: 700;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
        }

        .pph-boost {
            font-size: 12px;
            color: #d4af37;
            margin-top: 4px;
        }

        /* Ежедневные задания */
        .daily-section {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 28px;
            padding: 16px;
            margin-top: 20px;
        }

        .daily-title {
            font-size: 18px;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cipher-box {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }

        .cipher-word {
            font-size: 32px;
            font-weight: 800;
            color: #d4af37;
            letter-spacing: 8px;
            margin-bottom: 8px;
        }

        .cipher-hint {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #94a3b8);
            margin-bottom: 12px;
        }

        .cipher-button {
            background: #d4af37;
            border: none;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .cipher-button:active {
            transform: scale(0.96);
        }

        .cipher-button.completed {
            background: #10b981;
            color: white;
            pointer-events: none;
        }

        .combo-cards {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .combo-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .combo-card.selected {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .combo-card.completed {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            pointer-events: none;
        }

        .combo-emoji {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .combo-name {
            font-size: 12px;
            color: var(--tg-theme-text-color, #ffffff);
        }

        /* Анимация клика */
        .click-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
        }

        .click-effect.active {
            animation: ripple 0.5s ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Верхняя статистика -->
        <div class="stats-panel">
            <div class="balance">
                <span class="balance-icon">👉</span>
                <span id="balanceDisplay">0</span>
            </div>
            <div class="energy">
                <span>⚡</span>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                </div>
                <span class="energy-text" id="energyDisplay">100/100</span>
            </div>
        </div>

        <!-- PPH (Прибыль в час) -->
        <div class="pph-panel">
            <span>💰 Прибыль в час (PPH)</span>
            <span class="pph-value" id="pphDisplay">0</span>
        </div>

        <!-- Буда -->
        <div class="buda-section">
            <div class="buda-button" id="budaButton">
                <div class="buda-emoji" id="budaEmoji">😤</div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div class="fatness-name" id="fatnessName">Буда-спичка</div>
            <div class="click-power" id="clickPowerDisplay">+1 за тычок</div>
        </div>

        <!-- Улучшения -->
        <div class="upgrades-section">
            <div class="section-title">
                <span>🔧</span> Прокачка Буды
            </div>
            <div class="upgrades-grid" id="upgradesGrid"></div>
        </div>

        <!-- Ежедневные задания (как в Hamster Kombat) -->
        <div class="daily-section">
            <div class="daily-title">
                <span>📅</span> Ежедневный шифр (Daily Cipher)
            </div>
            <div class="cipher-box">
                <div class="cipher-word" id="cipherWord">•••</div>
                <div class="cipher-hint" id="cipherHint">Введи слово азбукой Морзе</div>
                <button class="cipher-button" id="cipherButton" onclick="claimCipher()">Забрать 1 млн 🪙</button>
            </div>

            <div class="daily-title" style="margin-top: 16px;">
                <span>🎴</span> Ежедневная комбо (Daily Combo)
            </div>
            <div class="combo-cards" id="comboCards"></div>
            <button class="cipher-button" id="comboButton" onclick="claimCombo()" style="margin-top: 12px;">Забрать 5 млн 🪙</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Отключаем стандартное предупреждение браузера
        window.onbeforeunload = null;

        // Данные пользователя
        let userData = {
            balance: 0,
            energy: 100,
            maxEnergy: 100,
            clickPower: 1,
            totalClicks: 0,
            totalEarned: 0,
            critChance: 0,
            energyRegen: 1,
            premium: false,
            pph: 0, // Profit Per Hour
            
            // Улучшения с пассивным доходом
            upgrades: {
                kyc: { level: 0, basePph: 10, price: 500 },
                marketing: { level: 0, basePph: 25, price: 1200 },
                legal: { level: 0, basePph: 50, price: 3000 },
                dev: { level: 0, basePph: 100, price: 7500 }
            },
            
            // Ежедневные задания (обновляются раз в сутки)
            daily: {
                cipherCompleted: false,
                comboCompleted: false,
                lastReset: Date.now()
            }
        };

        // Стадии толстоты
        const fatnessStages = [
            { threshold: 0, name: "Буда-спичка", emoji: "😤" },
            { threshold: 100, name: "Буда-пончик", emoji: "🍩" },
            { threshold: 1000, name: "Буда-пухлик", emoji: "🥟" },
            { threshold: 10000, name: "Буда-колобок", emoji: "⚪" },
            { threshold: 100000, name: "Буда-телепузик", emoji: "🐷" },
            { threshold: 500000, name: "Буда-бочка", emoji: "🛢️" },
            { threshold: 1000000, name: "Буда-планета", emoji: "🌍" }
        ];

        // ===== ЗАГРУЗКА И СОХРАНЕНИЕ (НАДЁЖНО) =====
        function loadData() {
            try {
                const saved = localStorage.getItem('budaData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    userData = { ...userData, ...parsed };
                }
            } catch (e) {
                console.error('Ошибка загрузки', e);
            }
            
            // Синхронизируем с ботом
            sendDataToBot('sync');
            updateDisplay();
        }

        function saveData() {
            localStorage.setItem('budaData', JSON.stringify(userData));
        }

        // Сохраняем перед закрытием
        window.addEventListener('beforeunload', function() {
            saveData();
            sendDataToBot('sync');
        });

        // Автосохранение каждые 5 секунд
        setInterval(saveData, 5000);

        // Отправка данных боту
        function sendDataToBot(action, extra = {}) {
            const payload = {
                action: action,
                balance: userData.balance,
                totalClicks: userData.totalClicks,
                totalEarned: userData.totalEarned,
                pph: userData.pph,
                ...extra
            };
            tg.sendData(JSON.stringify(payload));
        }

        // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
        function updateDisplay() {
            // Основные показатели
            document.getElementById('balanceDisplay').textContent = userData.balance;
            document.getElementById('energyDisplay').textContent = `${userData.energy}/${userData.maxEnergy}`;
            document.getElementById('energyFill').style.width = `${(userData.energy / userData.maxEnergy) * 100}%`;

            // Стадия толстоты
            let stage = fatnessStages[0];
            for (let i = fatnessStages.length - 1; i >= 0; i--) {
                if (userData.totalClicks >= fatnessStages[i].threshold) {
                    stage = fatnessStages[i];
                    break;
                }
            }
            document.getElementById('budaEmoji').textContent = stage.emoji;
            document.getElementById('fatnessName').textContent = stage.name;

            // Сила клика
            let powerText = `+${userData.clickPower}`;
            if (userData.premium) powerText += ' x2';
            if (userData.critChance > 0) powerText += ` (крит ${userData.critChance}%)`;
            document.getElementById('clickPowerDisplay').textContent = powerText;

            // PPH (прибыль в час)
            userData.pph = calculatePPH();
            document.getElementById('pphDisplay').textContent = userData.pph.toLocaleString();

            // Отрисовка улучшений
            renderUpgrades();
            
            // Ежедневные задания
            updateDailyDisplay();

            // Сохраняем
            saveData();
        }

        // ===== PPH (ПРИБЫЛЬ В ЧАС) =====
        function calculatePPH() {
            let total = 0;
            for (let [key, upgrade] of Object.entries(userData.upgrades)) {
                total += upgrade.level * upgrade.basePph;
            }
            return total;
        }

        // Пассивный доход (каждые 10 секунд)
        setInterval(() => {
            if (userData.pph > 0) {
                // PPH / 360 = монет в секунду, *10 = за 10 секунд
                let passiveEarn = Math.floor(userData.pph / 360) * 10;
                if (passiveEarn > 0) {
                    userData.balance += passiveEarn;
                    userData.totalEarned += passiveEarn;
                    updateDisplay();
                }
            }
        }, 10000);

        // ===== УЛУЧШЕНИЯ =====
        function renderUpgrades() {
            const grid = document.getElementById('upgradesGrid');
            grid.innerHTML = '';
            
            for (let [key, upgrade] of Object.entries(userData.upgrades)) {
                const card = document.createElement('div');
                card.className = `upgrade-card ${userData.balance < upgrade.price ? 'disabled' : ''}`;
                card.onclick = () => buyUpgrade(key);
                
                let emoji = '';
                let name = '';
                switch(key) {
                    case 'kyc': emoji = '🔐'; name = 'KYC'; break;
                    case 'marketing': emoji = '📢'; name = 'Маркетинг'; break;
                    case 'legal': emoji = '⚖️'; name = 'Юристы'; break;
                    case 'dev': emoji = '💻'; name = 'Разработка'; break;
                }
                
                card.innerHTML = `
                    <div class="upgrade-emoji">${emoji}</div>
                    <div class="upgrade-name">${name} Lv.${upgrade.level}</div>
                    <div class="pph-boost">+${upgrade.basePph} PPH/ур</div>
                    <div class="upgrade-price">${upgrade.price} 🪙</div>
                `;
                grid.appendChild(card);
            }
        }

        function buyUpgrade(key) {
            const upgrade = userData.upgrades[key];
            if (userData.balance >= upgrade.price) {
                userData.balance -= upgrade.price;
                upgrade.level++;
                upgrade.price = Math.floor(upgrade.price * 1.5); // цена растёт
                
                updateDisplay();
                sendDataToBot('upgrade', { type: key });
                
                tg.HapticFeedback?.notificationOccurred('success');
            } else {
                tg.HapticFeedback?.notificationOccurred('error');
            }
        }

        // ===== КЛИК ПО БУДЕ =====
        document.getElementById('budaButton').addEventListener('click', (e) => {
            if (userData.energy <= 0) {
                tg.HapticFeedback?.notificationOccurred('error');
                return;
            }

            // Анимация
            const button = e.currentTarget;
            button.style.transform = 'scale(0.96)';
            setTimeout(() => button.style.transform = 'scale(1)', 100);

            // Эффект
            const rect = button.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const effect = document.getElementById('clickEffect');
            effect.style.left = x - 40 + 'px';
            effect.style.top = y - 40 + 'px';
            effect.classList.add('active');
            setTimeout(() => effect.classList.remove('active'), 500);

            tg.HapticFeedback?.impactOccurred('medium');

            // Расчёт дохода
            let earned = userData.clickPower;
            if (userData.premium) earned *= 2;
            if (Math.random() * 100 < userData.critChance) {
                earned *= 3;
                tg.HapticFeedback?.notificationOccurred('success');
            }

            userData.balance += earned;
            userData.totalEarned += earned;
            userData.totalClicks++;
            userData.energy--;

            updateDisplay();
            sendDataToBot('click', { earned });
        });

        // ===== ЕЖЕДНЕВНЫЕ ЗАДАНИЯ (КАК В HAMSTER KOMBAT) =====
        const DAILY_WORDS = [
            { word: "HAMSTER", morse: ".... .- -- ... - . .-.", date: 20260310 },
            { word: "BUDA", morse: "-... ..- -.. .-", date: 20260310 },
            { word: "COIN", morse: "-.-. --- .. -.", date: 20260310 }
        ];

        function updateDailyDisplay() {
            // Проверяем, не пора ли сбросить (новый день)
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            if (now - userData.daily.lastReset > oneDay) {
                userData.daily.cipherCompleted = false;
                userData.daily.comboCompleted = false;
                userData.daily.lastReset = now;
            }

            // Шифр
            const cipherBtn = document.getElementById('cipherButton');
            if (userData.daily.cipherCompleted) {
                cipherBtn.textContent = '✅ Уже забрано';
                cipherBtn.classList.add('completed');
            } else {
                cipherBtn.textContent = 'Забрать 1 млн 🪙';
                cipherBtn.classList.remove('completed');
            }

            // Комбо-карты (три случайные карты)
            const comboDiv = document.getElementById('comboCards');
            const cards = [
                { emoji: '🔐', name: 'KYC', letter: 'K' },
                { emoji: '📢', name: 'Маркетинг', letter: 'M' },
                { emoji: '⚖️', name: 'Юристы', letter: 'L' },
                { emoji: '💻', name: 'Разработка', letter: 'D' },
                { emoji: '🏦', name: 'Банк', letter: 'B' },
                { emoji: '📊', name: 'Аналитика', letter: 'A' }
            ];
            
            // Берём три случайные карты с одинаковой буквой (для комбо)
            const letters = ['K', 'M', 'L', 'D', 'B', 'A'];
            const comboLetter = letters[Math.floor(Math.random() * letters.length)];
            const selectedCards = cards.filter(c => c.letter === comboLetter).slice(0, 3);
            
            comboDiv.innerHTML = '';
            selectedCards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `combo-card ${userData.daily.comboCompleted ? 'completed' : ''}`;
                cardDiv.onclick = () => selectComboCard(index);
                cardDiv.innerHTML = `
                    <div class="combo-emoji">${card.emoji}</div>
                    <div class="combo-name">${card.name}</div>
                `;
                comboDiv.appendChild(cardDiv);
            });

            const comboBtn = document.getElementById('comboButton');
            if (userData.daily.comboCompleted) {
                comboBtn.textContent = '✅ Уже забрано';
                comboBtn.classList.add('completed');
            } else {
                comboBtn.textContent = 'Забрать 5 млн 🪙';
                comboBtn.classList.remove('completed');
            }
        }

        window.claimCipher = function() {
            if (!userData.daily.cipherCompleted) {
                userData.balance += 1000000;
                userData.totalEarned += 1000000;
                userData.daily.cipherCompleted = true;
                updateDisplay();
                sendDataToBot('daily', { type: 'cipher', reward: 1000000 });
                tg.HapticFeedback?.notificationOccurred('success');
                tg.showPopup({
                    title: '🎉 +1 млн монет!',
                    message: 'Шифр разгадан!',
                    buttons: [{ type: 'ok' }]
                });
            }
        };

        window.claimCombo = function() {
            if (!userData.daily.comboCompleted) {
                userData.balance += 5000000;
                userData.totalEarned += 5000000;
                userData.daily.comboCompleted = true;
                updateDisplay();
                sendDataToBot('daily', { type: 'combo', reward: 5000000 });
                tg.HapticFeedback?.notificationOccurred('success');
                tg.showPopup({
                    title: '🔥 +5 млн монет!',
                    message: 'Комбо собрано!',
                    buttons: [{ type: 'ok' }]
                });
            }
        };

        // ===== ЗАПУСК =====
        loadData();
    </script>
</body>
</html>
